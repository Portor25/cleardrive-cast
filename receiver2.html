<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ClearDrive Music</title>
<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<!-- DIAGNOSTIC - remove once playback works. Google's debug overlay prints receiver errors on
     the TV itself, which is the only way to see why a load fails; the sender only ever gets
     "DetailedCode=null". -->
<script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; color: #fff; }

  /* The framework's own player. It MUST exist in the DOM or nothing plays, and we now let it
     draw its normal UI - blurred backdrop, cover thumbnail, title and progress bar. Trying to
     hide it was a dead end: it renders through a shadow DOM the page cannot restyle. Its cover
     thumbnail sits top-right and cannot be moved for the same reason.
     Lyrics are simply drawn OVER the top instead. */
  cast-media-player { position: absolute; inset: 0; z-index: 0; }

  /* Lyrics overlay. Sits in the empty middle band, clear of the framework's thumbnail (top-right)
     and its title/progress (bottom-left). pointer-events:none so it can never intercept anything
     the player needs. */
  #root {
    position: absolute; left: 0; right: 0; top: 22vh; height: 56vh; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #root.no-lyrics { display: none; }

  #lyrics-pane {
    width: 62vw; height: 100%; overflow: hidden; position: relative;
    padding: 0 3vw;
    /* Scrim so words stay readable over any album art */
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 72%);
    mask-image: linear-gradient(transparent, #000 15%, #000 85%, transparent);
    -webkit-mask-image: linear-gradient(transparent, #000 15%, #000 85%, transparent);
  }
  #lyrics { position: absolute; width: 100%; transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1); }
  .line {
    font-size: 2.4vw; line-height: 1.9; font-weight: 500; text-align: center;
    color: rgba(255,255,255,0.45); transition: color 0.3s, font-size 0.3s;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }
  .line.current { font-size: 3.1vw; font-weight: 700; color: #00E676; }

  /* Unused now the framework draws these - kept out of the way rather than deleted, so the
     existing script can still reference them without null checks. */
  #bg, #artwork-pane { display: none; }
</style>
</head>
<body>
<cast-media-player></cast-media-player>
<div id="bg"></div>
<div id="root" class="no-lyrics">
  <div id="artwork-pane">
    <img id="artwork" src="" alt="">
    <div id="title"></div>
    <div id="artist"></div>
    <div id="progress-wrap"><div id="progress"></div></div>
  </div>
  <div id="lyrics-pane"><div id="lyrics"></div></div>
</div>

<script>
const context = cast.framework.CastReceiverContext.getInstance();
const playerManager = context.getPlayerManager();
const NAMESPACE = 'urn:x-cast:com.cleardrive.lyrics';

let lyricLines = [];   // [{t: ms, text: string}]
let accent = '#00E676';
let currentIndex = -1;

// Phone sends lyrics (and theme colour) for the current track.
// The Android sender calls session.sendMessage(namespace, jsonString), so event.data can arrive
// as a STRING rather than a parsed object. Reading .type off a string yields undefined and the
// message was being silently dropped - hence lyrics that sent fine but never appeared.
context.addCustomMessageListener(NAMESPACE, (event) => {
  try {
    var data = event && event.data;
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch (parseErr) {
        if (window.say) say('lyrics msg not JSON: ' + String(data).slice(0, 80));
        return;
      }
    }
    data = data || {};
    if (window.say) say('msg type=' + data.type + ' lines=' + ((data.lines || []).length));

    if (data.type === 'lyrics') {
      lyricLines = Array.isArray(data.lines) ? data.lines : [];
      accent = data.accent || '#00E676';
      currentIndex = -1;
      renderLyrics();
    } else if (data.type === 'clear') {
      lyricLines = [];
      renderLyrics();
    }
  } catch (e) {
    if (window.say) say('lyrics handler threw: ' + e);
  }
});

function renderLyrics() {
  const root = document.getElementById('root');
  const container = document.getElementById('lyrics');
  container.innerHTML = '';
  if (!lyricLines.length) {
    root.classList.add('no-lyrics');
    return;
  }
  root.classList.remove('no-lyrics');
  lyricLines.forEach((line) => {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = line.text || ' ';
    container.appendChild(div);
  });
  document.querySelectorAll('#progress').forEach(el => el.style.background = accent);
}

// Track metadata -> artwork, title, artist, blurred background
playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, () => {
  const media = playerManager.getMediaInformation();
  if (!media || !media.metadata) return;
  const meta = media.metadata;
  document.getElementById('title').textContent = meta.title || '';
  document.getElementById('artist').textContent = meta.artist || '';
  const img = (meta.images && meta.images.length) ? meta.images[0].url : '';
  if (img) {
    document.getElementById('artwork').src = img;
    document.getElementById('bg').style.backgroundImage = 'url("' + img + '")';
  }
});

// Karaoke sync loop: runs off the TV's own playback clock
setInterval(() => {
  const duration = playerManager.getDurationSec();
  const t = playerManager.getCurrentTimeSec() * 1000;
  if (duration > 0) {
    document.getElementById('progress').style.width =
      Math.min(100, (t / (duration * 1000)) * 100) + '%';
  }
  if (!lyricLines.length) return;

  let index = -1;
  for (let i = 0; i < lyricLines.length; i++) {
    if ((lyricLines[i].t || 0) <= t) index = i; else break;
  }
  if (index !== currentIndex) {
    currentIndex = index;
    const lines = document.querySelectorAll('.line');
    lines.forEach((el, i) => {
      el.classList.toggle('current', i === index);
      if (i === index) el.style.color = accent;
      else el.style.color = '';
    });
    if (index >= 0 && lines[index]) {
      const pane = document.getElementById('lyrics-pane');
      const offset = lines[index].offsetTop - pane.clientHeight / 2 + lines[index].clientHeight / 2;
      document.getElementById('lyrics').style.transform = 'translateY(' + (-Math.max(0, offset)) + 'px)';
    }
  }
}, 300);

// DIAGNOSTIC - remove once playback works.
//
// EVERY line is inside one try/catch, and context.start() lives after it. An earlier version put
// these statements bare: one of them threw, which killed the whole script before start() ran, so
// the receiver never initialised and the TV showed a black screen and dropped the connection.
// Diagnostics must never be able to break the thing they are diagnosing.
var say = function () {};
try {
  var errBox = document.createElement('div');
  errBox.style.cssText =
    'position:absolute;left:0;right:0;bottom:0;z-index:99;background:rgba(180,0,0,0.92);' +
    'color:#fff;font:1.1vw/1.5 monospace;padding:1vw;max-height:40vh;overflow:auto;white-space:pre-wrap;';
  document.body.appendChild(errBox);
  say = function (m) { errBox.textContent = (m + '\n' + errBox.textContent).slice(0, 4000); };
  say('receiver booted');

  try {
    var dbg = cast.debug.CastDebugLogger.getInstance();
    dbg.setEnabled(true);
    dbg.showDebugLogs(true);
    say('debug overlay on');
  } catch (e) { say('debug overlay unavailable: ' + e); }

  try {
    playerManager.addEventListener(cast.framework.events.EventType.ERROR, function (e) {
      say('ERROR code=' + (e && e.detailedErrorCode) + ' reason=' + (e && e.reason));
    });
    say('error listener on');
  } catch (e) { say('error listener failed: ' + e); }

  try {
    playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, function (req) {
      try {
        var m = (req && req.media) || {};
        say('LOAD id=' + m.contentId + ' type=' + m.contentType + ' stream=' + m.streamType);
      } catch (err) { say('LOAD log threw: ' + err); }
      return req;
    });
    say('load interceptor on');
  } catch (e) { say('load interceptor failed: ' + e); }
} catch (e) {
  // Even the banner failed. Nothing to report with, but start() below must still run.
}

context.start();
</script>
</body>
</html>
