<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- Without this, some TV browsers (the Thomson's) lay the page out at a default width instead of
     mapping 100vw/100vh to the physical panel, leaving an unfilled strip on two edges. The LG's
     browser filled anyway, which is why the border showed on one TV and not the other. Google's
     Default receiver and Deezer both ship this tag - that is why casting filled the screen before we
     built our own receiver. Standard Cast-receiver line; safe on every device. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ClearDrive Music</title>
<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden; background: #000;
    font-family: 'Roboto', sans-serif; color: #fff;
  }
  /* Solid black layer bled past every edge, so if the Thomson applies overscan there is still black
     under the crop instead of a lighter TV-backdrop border. Deezer fills edge-to-edge on the same
     TV; this matches that. The LG does not overscan, so it looks identical there. */
  #edge-fill {
    position: fixed; inset: -6vh -6vw; z-index: -2; background: #000;
  }

  /* THE media element. Replacing <cast-media-player> with a plain <video class="castMediaElement">
     is Google's documented route to a fully custom UI: the framework plays through this element
     but draws nothing, so the page below is finally ours. <cast-media-player> could not be used -
     it paints its own full-screen UI over everything and beat both opacity:0 !important and being
     parked at -10000px. This is audio, so the element itself never needs to be seen. */
  video.castMediaElement {
    position: fixed; left: -10000px; top: -10000px;
    width: 1px; height: 1px; opacity: 0; pointer-events: none;
  }

  #bg {
    position: absolute; inset: 0; z-index: -1;
    background-size: cover; background-position: center;
    filter: blur(50px) brightness(0.4);
    transform: scale(1.15);
  }

  #root { position: absolute; inset: 0; z-index: 1; }

  /* App name, centred along the top. */
  #appname {
    position: absolute; top: 3.5vh; left: 0; right: 0; z-index: 3;
    text-align: center; font-size: 1.7vw; font-weight: 700;
    letter-spacing: 0.08vw; color: rgba(255,255,255,0.9);
  }

  /* Left column: big cover with title, artist and progress beneath it (like Deezer). */
  #left {
    position: absolute; left: 5vw; top: 52%; transform: translateY(-50%);
    width: 36vw; display: flex; flex-direction: column; align-items: center;
  }
  #art-wrap { position: relative; }
  #artwork {
    width: 34vw; height: 34vw; object-fit: cover; border-radius: 14px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.7);
  }
  /* Loading spinner over the cover. Masks the 1-3s it takes a skipped local file to buffer, the
     same way Deezer covers its own load gap - the wait reads as intentional, not laggy. Shown only
     while the player state is loading/buffering (see the STATE_CHANGED handler). */
  #spinner {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 6vw; height: 6vw; display: none; z-index: 5;
    border: 0.6vw solid rgba(255,255,255,0.25);
    border-top-color: #00E676; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
  #root.loading #spinner { display: block; }
  #title {
    margin-top: 2.5vh; font-size: 2.3vw; font-weight: 700; text-align: center;
    max-width: 36vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #artist { margin-top: 0.6vh; font-size: 1.5vw; color: rgba(255,255,255,0.75); text-align: center; }
  #progress-wrap {
    margin-top: 2vh; width: 34vw; height: 5px;
    background: rgba(255,255,255,0.25); border-radius: 3px;
  }
  #progress { width: 0%; height: 100%; border-radius: 3px; background: #00E676; transition: width 0.4s linear; }

  /* Right column: scrolling lyrics. Starts just past the wider cover and runs to the edge, with a
     bigger font, so short lines fill the space instead of leaving a gap on the right. */
  #lyrics-pane {
    position: absolute; left: 45vw; right: 6vw; top: 8vh; height: 84vh; overflow: hidden;
    mask-image: linear-gradient(transparent, #000 22%, #000 78%, transparent);
    -webkit-mask-image: linear-gradient(transparent, #000 22%, #000 78%, transparent);
  }
  /* Deezer-style SNAP: the script only moves the block when the active line changes (not every
     tick), so this is ONE quick clean move per line and then it holds dead still. That stillness is
     why Deezer looks smooth on a TV - the panel isn't being asked to animate continuously. A short
     ease-out reads as a crisp jump-to-centre rather than a slow slide. The old version blended every
     100ms and that constant micro-motion is what looked jerky on the LG. */
  #lyrics { position: absolute; width: 100%; transition: transform 0.28s ease-out; }
  .line {
    font-size: 2.6vw; line-height: 1.3; font-weight: 600; margin: 6vh 0;
    overflow-wrap: break-word;
    color: rgba(255,255,255,0.3);
    transform-origin: left center;
    /* Grow the active line with transform, NOT font-size. font-size reflows every line below it,
       which shoved the layout and made the scroll lurch ("weird jump"). transform is composited -
       the line still visibly grows, but nothing reflows, so the scroll stays smooth. Deezer keeps
       all lines one size and only brightens the active one; this is the same idea with a nudge. */
    transition: color 0.3s, transform 0.3s;
    text-shadow: 0 2px 12px rgba(0,0,0,0.85);
  }
  /* Deezer does NOT grow the active line - it only brightens it. The scale() we had was the sole
     cause of the highlighted line clipping: a full-width line fits fine when dim, then scale pushed
     it past the pane's overflow:hidden edge (visible as "spent" -> "spe"). Emphasis is now colour +
     a stronger glow only, so the green line is exactly as wide as it was when grey and can never be
     cut off. Longer lines simply wrap (overflow-wrap on .line). */
  .line.current {
    color: #00E676;
    text-shadow: 0 0 18px rgba(0,230,118,0.45), 0 2px 12px rgba(0,0,0,0.85);
  }

  /* No lyrics for this track: centre the cover. */
  #root.no-lyrics #left { left: 50%; transform: translate(-50%, -50%); }
  #root.no-lyrics #artwork { width: 38vw; height: 38vw; }
  #root.no-lyrics #lyrics-pane { display: none; }
</style>
</head>
<body>
<video class="castMediaElement"></video>
<div id="edge-fill"></div>
<div id="bg"></div>
<div id="root" class="no-lyrics">
  <div id="appname">ClearDrive Music</div>
  <div id="left">
    <div id="art-wrap">
      <img id="artwork" src="" alt="">
      <div id="spinner"></div>
    </div>
    <div id="title"></div>
    <div id="artist"></div>
    <div id="progress-wrap"><div id="progress"></div></div>
  </div>
  <div id="lyrics-pane"><div id="lyrics"></div></div>
</div>

<script>
const context = cast.framework.CastReceiverContext.getInstance();
const playerManager = context.getPlayerManager();
const NAMESPACE = 'urn:x-cast:com.cleardrive.lyrics';

let lyricLines = [];   // [{t: ms, text: string}]
let accent = '#00E676';
let currentIndex = -1;

// How far AHEAD of the timestamp to highlight a line. LRC timestamps mark where a line begins, but
// a highlight that lands exactly then feels a beat late - the eye needs a moment to reach the words
// and the 300ms poll adds its own lag. Nudging ~700ms early makes it land on the beat and read
// smoother. Raise if lines still feel late, lower if they jump ahead of the vocal.
const LYRIC_LEAD_MS = 700;

var say = function () {};

function renderLyrics() {
  const root = document.getElementById('root');
  const container = document.getElementById('lyrics');
  container.innerHTML = '';
  if (!lyricLines.length) {
    root.classList.add('no-lyrics');
    return;
  }
  root.classList.remove('no-lyrics');
  lyricLines.forEach(function (line) {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = line.text || ' ';
    container.appendChild(div);
  });
}

// Paint whatever metadata we have. Called from both the data binder and MEDIA_STATUS, because
// which one fires reliably without <cast-media-player> is exactly what this build is testing.
function paintMetadata(meta) {
  if (!meta) return;
  const t = document.getElementById('title');
  const a = document.getElementById('artist');
  if (t) t.textContent = meta.title || '';
  if (a) a.textContent = meta.artist || '';
  const img = (meta.images && meta.images.length) ? meta.images[0].url : '';
  if (img) {
    const art = document.getElementById('artwork');
    const bg = document.getElementById('bg');
    if (art) art.src = img;
    if (bg) bg.style.backgroundImage = 'url("' + img + '")';
  }
}

// Phone sends lyrics for the current track. event.data can arrive as a STRING (the Android sender
// calls sendMessage with a JSON string), so parse before reading .type - otherwise every message
// is silently dropped.
context.addCustomMessageListener(NAMESPACE, function (event) {
  try {
    var data = event && event.data;
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch (parseErr) {
        say('lyrics not JSON: ' + String(data).slice(0, 60));
        return;
      }
    }
    data = data || {};
    say('msg type=' + data.type + ' lines=' + ((data.lines || []).length));

    if (data.type === 'lyrics') {
      lyricLines = Array.isArray(data.lines) ? data.lines : [];
      accent = data.accent || '#00E676';
      currentIndex = -1;
      renderLyrics();
    } else if (data.type === 'clear') {
      lyricLines = [];
      renderLyrics();
    }
  } catch (e) {
    say('lyrics handler threw: ' + e);
  }
});

playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, function () {
  try {
    const media = playerManager.getMediaInformation();
    if (media && media.metadata) paintMetadata(media.metadata);
  } catch (e) { /* binder below is the other route */ }
});

// Karaoke sync, driven by the TV's own playback clock so there is no phone-to-TV drift.
// Runs at 100ms (not 300ms) so the highlight lands closer to the beat and the scroll tracks
// smoothly rather than in visible steps.
setInterval(function () {
  try {
    const duration = playerManager.getDurationSec();
    const rawT = playerManager.getCurrentTimeSec() * 1000;
    const prog = document.getElementById('progress');
    if (prog && duration > 0) {
      prog.style.width = Math.min(100, (rawT / (duration * 1000)) * 100) + '%';
    }
    if (!lyricLines.length) return;

    // Look slightly ahead so the line is lit as it starts, not after.
    const t = rawT + LYRIC_LEAD_MS;
    let index = -1;
    for (let i = 0; i < lyricLines.length; i++) {
      if ((lyricLines[i].t || 0) <= t) index = i; else break;
    }
    const lines = document.querySelectorAll('.line');
    if (!lines.length) return;

    // Deezer-style discrete move: everything happens ONLY when the active line changes, not every
    // tick. The old version interpolated the scroll position continuously (every 100ms), and that
    // constant micro-nudging is exactly what looked jerky on the LG's slower GPU. Here the block
    // holds perfectly still, then does one clean snap to re-centre the new active line - which is
    // why Deezer looks smooth: it moves rarely, so the panel has an easy job.
    if (index !== currentIndex) {
      currentIndex = index;
      lines.forEach(function (el, i) {
        el.classList.toggle('current', i === index);
        el.style.color = (i === index) ? accent : '';
      });

      // Centre the active line (or line 0 before the song's first sung line). Offset is not clamped,
      // so the container can move down and reveal space above line 0 to truly centre it.
      var scrollIdx = index < 0 ? 0 : index;
      if (lines[scrollIdx]) {
        const pane = document.getElementById('lyrics-pane');
        const cur = lines[scrollIdx];
        const centre = cur.offsetTop + cur.clientHeight / 2;
        const offset = centre - pane.clientHeight / 2;
        document.getElementById('lyrics').style.transform = 'translateY(' + (-offset) + 'px)';
      }
    }
  } catch (e) { /* never let the loop die */ }
}, 100);

// Everything below is inside one try/catch, with context.start() after it. A diagnostic must never
// be able to stop the receiver starting; an earlier version had bare statements, one threw, and the
// TV showed a black screen and dropped the connection.
//
try {

  // The data binder: what replaces <cast-media-player> for driving a custom UI. This is what makes
  // the whole thing work - with <cast-media-player> the framework paints its own full-screen UI
  // over everything, and no amount of CSS can stop it.
  try {
    var playerData = {};
    var binder = new cast.framework.ui.PlayerDataBinder(playerData);
    binder.addEventListener(cast.framework.ui.PlayerDataEventType.STATE_CHANGED, function (e) {
      // Show the spinner while the player is loading or buffering, hide it once it plays. Matched
      // loosely on the string so it holds whatever exact casing/values the SDK reports.
      try {
        var s = ((e && e.value) || '').toString().toLowerCase();
        var root = document.getElementById('root');
        if (s.indexOf('load') >= 0 || s.indexOf('buffer') >= 0) root.classList.add('loading');
        else root.classList.remove('loading');
      } catch (err) {}
      say('state=' + (e && e.value));
    });
    binder.addEventListener(cast.framework.ui.PlayerDataEventType.MEDIA_CHANGED, function () {
      try {
        // Do NOT clear lyrics here. MEDIA_CHANGED can fire AFTER the phone's new lyrics message has
        // already arrived and rendered, which wiped freshly-shown lyrics - the song's lyrics flashed
        // on screen then vanished to the no-lyrics view a second later. The phone sends {lyrics} or
        // {clear} for every track, so lyric state is driven entirely by those messages.
        if (playerData.media && playerData.media.metadata) paintMetadata(playerData.media.metadata);
        say('media changed: ' + (playerData.media && playerData.media.metadata &&
             playerData.media.metadata.title));
      } catch (err) { say('media changed threw: ' + err); }
    });
    say('data binder on');
  } catch (e) { say('data binder failed: ' + e); }

  try {
    playerManager.addEventListener(cast.framework.events.EventType.ERROR, function (e) {
      say('ERROR code=' + (e && e.detailedErrorCode) + ' reason=' + (e && e.reason));
    });
  } catch (e) { say('error listener failed: ' + e); }
} catch (e) {
  // Even the banner failed. start() below must still run.
}

context.start();
</script>
</body>
</html>
